# Dependabot — 自動盯 GitHub Actions 版本，有新版/deprecation 就發升級 PR。
# 監控 .github/workflows/ 下所有 workflow（racing-weekly.yml、tests.yml）。
# 分組成單一 PR，避免每個 action 各開一條。
#
# 建立動機（2026-07-20）：本站原本漏設，workflow 停在 checkout@v5 / setup-node@v5，
# 而 baseball／basketball 已由 dependabot 升到 v7 → 站群版本不一致。設定與那兩站逐字對齊。
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Asia/Taipei"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
