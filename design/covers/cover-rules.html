<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,400;0,600;0,700;1,700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { width:2400px; height:1260px; background:#131320; color:#eef0f4;
  font-family:'Noto Sans TC',sans-serif; overflow:hidden; position:relative;
  background: radial-gradient(120% 80% at 20% -10%, #1e1e33 0%, #131320 60%); }
.grid { position:absolute; inset:0; opacity:.12;
  background-image: linear-gradient(rgba(167,139,250,.35) 1px, transparent 1px),
    linear-gradient(90deg, rgba(167,139,250,.35) 1px, transparent 1px);
  background-size: 120px 120px; }
.wrap { position:relative; padding:110px 130px; height:100%; display:flex; flex-direction:column; }
.brand { font-family:'Chakra Petch'; font-style:italic; font-weight:700; font-size:44px;
  letter-spacing:6px; color:#a78bfa; }
.tag { font-family:'Chakra Petch'; font-size:26px; letter-spacing:10px; color:#8e99ad; margin-top:10px; text-transform:uppercase; }
h1 { font-weight:900; font-size:120px; line-height:1.18; margin-top:60px; letter-spacing:2px; }
h1 .y { font-family:'Chakra Petch'; font-style:italic; color:#a78bfa; }
.sub { font-size:44px; color:#c3c9d6; margin-top:34px; letter-spacing:2px; }
.viz { margin-top:auto; display:flex; gap:80px; align-items:flex-end; }
.chart { flex:1; }
.chart .lbl { font-family:'Chakra Petch'; font-size:28px; color:#8e99ad; letter-spacing:4px; margin-bottom:18px; }
.bar { display:flex; height:86px; border-radius:14px; overflow:hidden; margin-bottom:14px; font-family:'Chakra Petch'; font-weight:700; }
.bar div { display:flex; align-items:center; padding-left:28px; font-size:30px; }
.ice { background:#3d3d5c; color:#c3c9d6; }
.ele { background:#a78bfa; color:#131320; }
.legend { font-size:26px; color:#8e99ad; margin-top:6px; letter-spacing:2px; }
.stats { display:flex; gap:56px; }
.stat { border-left:6px solid #a78bfa; padding-left:30px; }
.stat b { display:block; font-family:'Chakra Petch'; font-style:italic; font-size:70px; color:#a78bfa; }
.stat span { font-size:28px; color:#8e99ad; letter-spacing:2px; }
.foot { position:absolute; bottom:44px; right:130px; font-size:24px; color:#67728a; letter-spacing:2px; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="wrap">
  <div class="brand">@RACING</div>
  <div class="tag">賽車數據誌 · 長青指南</div>
  <h1><span class="y">2026</span> F1 新規則<br>完全指南</h1>
  <div class="sub">Overtake Mode ・ 主動空力 ・ 接近 50/50 的油電動力單元</div>
  <div class="viz">
    <div class="chart">
      <div class="lbl">動力單元輸出結構（kW）</div>
      <div class="bar" style="width:100%"><div class="ice" style="width:82%">內燃機 550</div><div class="ele" style="width:18%">120</div></div>
      <div class="bar" style="width:100%"><div class="ice" style="width:53%">內燃機 400</div><div class="ele" style="width:47%">電動 350</div></div>
      <div class="legend">上：2025 之前　下：2026 起　■ 電動輸出</div>
    </div>
    <div class="stats">
      <div class="stat"><b>22</b><span>賽站</span></div>
      <div class="stat"><b>11</b><span>車隊</span></div>
      <div class="stat"><b>768<i style="font-size:36px">kg</i></b><span>最低車重</span></div>
    </div>
  </div>
  <div class="foot">racing.twtools.cc ・ 非官方資訊站，數據依 FIA/官方公開說明</div>
</div>
</body>
</html>
